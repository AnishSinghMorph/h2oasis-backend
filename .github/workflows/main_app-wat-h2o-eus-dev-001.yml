# Azure Web Apps Deploy — Node.js

name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NPM_CONFIG_AUDIT: 'false'

      - name: Build TypeScript
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --production --no-audit --no-fund

      - name: Disable audit for Azure Oryx build engine
        run: echo "audit=false" >> .npmrc

      - name: Create deployment artifact
        run: |
          zip -r deploy.zip . -x "*.git*" -x "src/*" -x "scripts/*" -x "tests/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-wat-h2o-eus-dev-001'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4D4FD94C9ED344859DC0804817C0FEBA }}
          package: deploy.zip
